services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://bb:bb@db:5432/backlogbuddy
      - REDIS_URL=redis://redis:6379/0

  worker:
    build: ./backend
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info
    env_file: ./backend/.env
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgresql+asyncpg://bb:bb@db:5432/backlogbuddy
      - REDIS_URL=redis://redis:6379/0

  beat:
    build: ./backend
    command: celery -A app.core.celery_app.celery_app beat --loglevel=info
    env_file: ./backend/.env
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bb
      POSTGRES_PASSWORD: bb
      POSTGRES_DB: backlogbuddy
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
